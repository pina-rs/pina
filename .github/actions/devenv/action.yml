name: devenv
description: "Setup development environment with devenv"
inputs:
  github-token:
    description: Provide a github token
    required: true
  cache-version:
    description: The version of the cache to use.
    required: false
    default: "v1"
  setup-retries:
    description: Number of retries for transient nix/devenv setup failures.
    required: false
    default: "3"

runs:
  using: composite
  steps:
    - name: cache rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "${{ inputs.cache-version }}"

    - name: cache cargo binaries
      uses: actions/cache@v4
      with:
        path: ./.bin
        key: ${{ runner.os }}-cargo-bin-${{ inputs.cache-version }}-${{ env.RUSTUP_TOOLCHAIN }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-bin-${{ inputs.cache-version }}-

    - name: install nix
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ inputs.github-token }}

    - name: setup nix environment
      run: |
        retry() {
          local attempts="$1"
          shift

          local attempt=1
          local delay=5
          while true; do
            if "$@"; then
              return 0
            fi

            local exit_code=$?
            if [ "$attempt" -ge "$attempts" ]; then
              echo "Command failed after ${attempt} attempt(s): $*"
              return "$exit_code"
            fi

            echo "Command failed with exit code ${exit_code}: $*"
            echo "Retrying (${attempt}/${attempts}) in ${delay}s..."
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done
        }

        attempts="${{ inputs.setup-retries }}"
        retry "$attempts" nix profile add --accept-flake-config nixpkgs#cachix
        retry "$attempts" cachix use devenv
        retry "$attempts" nix profile add nixpkgs#devenv
      shell: bash

    - name: install dependencies
      run: |
        retry() {
          local attempts="$1"
          shift

          local attempt=1
          local delay=5
          while true; do
            if "$@"; then
              return 0
            fi

            local exit_code=$?
            if [ "$attempt" -ge "$attempts" ]; then
              echo "Command failed after ${attempt} attempt(s): $*"
              return "$exit_code"
            fi

            echo "Command failed with exit code ${exit_code}: $*"
            echo "Retrying (${attempt}/${attempts}) in ${delay}s..."
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done
        }

        attempts="${{ inputs.setup-retries }}"
        retry "$attempts" devenv shell -- bash -e -c "install:cargo:bin"
      shell: bash
