name: "ci"
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: lint clippy
        run: lint:clippy
        shell: devenv shell -c -- bash -e {0}

      - name: lint formatting
        run: lint:format
        shell: devenv shell -c -- bash -e {0}

      - name: verify docs
        run: verify:docs
        shell: devenv shell -c -- bash -e {0}

  security:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: verify dependency security
        run: verify:security
        shell: devenv shell -c -- bash -e {0}

  test:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run tests
        run: |
          sudo prlimit --pid $$ --nofile=1000000:1000000
          test:all
        shell: devenv shell -- bash -e {0}

  anchor-parity:
    timeout-minutes: 120
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cache sbpf gallery toolchain
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/sbpf-linker-upstream-gallery/llvm-install
            ${{ github.workspace }}/.cache/sbpf-linker-upstream-gallery/bin
            ${{ github.workspace }}/.cache/sbpf-linker-upstream-gallery/sbpf-linker
          key: ${{ runner.os }}-sbpf-gallery-v1-${{ hashFiles('devenv.nix', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-sbpf-gallery-v1-

      - name: run anchor parity tests
        run: test:anchor-parity
        shell: devenv shell -c -- bash -e {0}

  idl:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: verify codama generation
        run: test:idl
        shell: devenv shell -c -- bash -e {0}

  build:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: build:default
        shell: devenv shell -c -- bash -e {0}

      - name: build pina no-default matrix
        run: build:pina:no-default
        shell: devenv shell -c -- bash -e {0}

      - name: build all features
        run: build:all
        shell: devenv shell -c -- bash -e {0}
