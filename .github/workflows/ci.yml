name: "ci"
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: lint all
        run: lint:all
        shell: devenv shell -c -- bash -e {0}

  security:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: verify security
        run: verify:security
        shell: devenv shell -c -- bash -e {0}

  test:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run tests
        run: |
          sudo prlimit --pid $$ --nofile=1000000:1000000
          test:all
        shell: devenv shell -- bash -e {0}

  miri:
    timeout-minutes: 90
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run miri loader regressions
        run: test:miri
        shell: devenv shell -c -- bash -e {0}

  feature-matrix:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            build_task: build:pina:default
            test_task: test:pina:default
            doc_task: ""
          - label: no-default
            build_task: build:pina:no-default-only
            test_task: test:pina:no-default
            doc_task: doc:pina:no-default
          - label: token-only
            build_task: build:pina:token-only
            test_task: test:pina:token-only
            doc_task: ""
          - label: all-features
            build_task: build:pina:all-features
            test_task: test:pina:all-features
            doc_task: ""
    name: feature-matrix (${{ matrix.label }})
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build `pina` for ${{ matrix.label }}
        run: ${{ matrix.build_task }}
        shell: devenv shell -c -- bash -e {0}

      - name: test `pina` for ${{ matrix.label }}
        run: ${{ matrix.test_task }}
        shell: devenv shell -c -- bash -e {0}

      - name: build `pina` docs for ${{ matrix.label }}
        if: ${{ matrix.doc_task != '' }}
        run: ${{ matrix.doc_task }}
        shell: devenv shell -c -- bash -e {0}

  program-e2e:
    timeout-minutes: 120
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cache sbpf gallery toolchain
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/sbpf-linker-upstream-gallery/llvm-install
            ${{ github.workspace }}/.cache/sbpf-linker-upstream-gallery/bin
          key: ${{ runner.os }}-sbpf-gallery-v2-${{ hashFiles('devenv.nix', 'rust-toolchain.toml', '.github/workflows/ci.yml', '.github/workflows/compute-units.yml') }}
          restore-keys: |
            ${{ runner.os }}-sbpf-gallery-v2-

      - name: run program e2e tests
        run: test:program-e2e
        shell: devenv shell -c -- bash -e {0}

  idl:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: verify codama generation
        run: test:idl
        shell: devenv shell -c -- bash -e {0}

      - name: show codama diff on failure
        if: failure()
        run: |
          git --no-pager status --short -- codama/idls codama/clients/rust codama/clients/js
          echo
          git --no-pager diff --stat -- codama/idls codama/clients/rust codama/clients/js
          echo
          git --no-pager diff -- codama/idls codama/clients/rust codama/clients/js
        shell: bash

  build:
    timeout-minutes: 60
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build workspace default features
        run: build:default
        shell: devenv shell -c -- bash -e {0}

      - name: build workspace all features
        run: build:all
        shell: devenv shell -c -- bash -e {0}
