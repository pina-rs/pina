[defaults]
package_type = "cargo"
parent_bump = "patch"

[defaults.changelog]
path = "{{ path }}/changelog.md"
format = "keep_a_changelog"

[source]
provider = "github"
owner = "pina-rs"
repo = "pina"

[package.pina]
path = "crates/pina"
type = "cargo"

[package.pina_cli]
path = "crates/pina_cli"
type = "cargo"

[package.pina_macros]
path = "crates/pina_macros"
type = "cargo"

[package.pina_codama_renderer]
path = "crates/pina_codama_renderer"
type = "cargo"

[package.pina_pod_primitives]
path = "crates/pina_pod_primitives"
type = "cargo"

[package.pina_profile]
path = "crates/pina_profile"
type = "cargo"

[package.pina_sdk_ids]
path = "crates/pina_sdk_ids"
type = "cargo"

[package."codama-nodes-from-pina"]
path = "packages/nodes-from-pina"
type = "npm"

[group.core]
packages = [
	"pina",
	"pina_cli",
	"pina_macros",
	"pina_codama_renderer",
	"pina_pod_primitives",
	"pina_profile",
	"pina_sdk_ids",
]
release = true
tag = true

[ecosystems.cargo]
enabled = true
versioned_files = ["Cargo.toml"]
lockfile_commands = [{ command = "cargo generate-lockfile" }]

[ecosystems.npm]
enabled = true
lockfile_commands = [{ command = "pnpm install --lockfile-only" }]

[ecosystems.cargo.publish]
enabled = true
mode = "builtin"
trusted_publishing = true

[ecosystems.npm.publish]
enabled = true
mode = "builtin"
registry = "npm"
trusted_publishing = true

[changelog.types]
feat = { bump = "minor", section = "feat", description = "New user-facing functionality" }
fix = { bump = "patch", section = "fix", description = "Bug fixes" }
docs = { bump = "none", section = "docs", description = "Documentation only" }
note = { bump = "none", section = "note", description = "Internal or infrastructure notes" }

[changelog.sections]
feat = { heading = "Added", priority = 20 }
fix = { heading = "Fixed", priority = 30 }
note = { heading = "Notes", priority = 50 }
docs = { heading = "Documentation", priority = 40 }

[cli.change]
help_text = "Create a changeset"
inputs = [
	{ name = "package", type = "string_list", required = true },
	{ name = "bump", type = "choice", choices = ["none", "patch", "minor", "major"], default = "patch" },
	{ name = "reason", type = "string", required = true },
	{ name = "type", type = "string" },
	{ name = "caused_by", type = "string_list" },
]
steps = [{ name = "create change file", type = "CreateChangeFile" }]

[cli.release]
help_text = "Prepare versioned package files"
inputs = [
	{ name = "format", type = "choice", choices = ["text", "markdown", "json"], default = "markdown" },
]
steps = [
	{ name = "plan release", type = "PrepareRelease" },
	{ name = "format code", type = "Command", command = "dprint fmt" },
	{ name = "refresh lockfile", type = "Command", command = "cargo generate-lockfile" },
	{ name = "refresh pnpm lockfile", type = "Command", command = "pnpm install --lockfile-only" },
]
